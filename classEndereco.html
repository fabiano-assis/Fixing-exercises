<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endereco</title>
</head>
<body>
    <script>
        class Endereco {
    constructor(rua,bairro,cidade,estado){
        this.rua = rua;
        this.bairro = bairro;
        this.cidade = cidade;
        this.estado = estado;
    }

    set updateRua(novaRua){
        this.rua = novaRua;
    }
    
    set updateBairro(novoBairro){
        this.bairro = novoBairro;
    }

    set updateCidade(novaCidade){
        this.cidade = novaCidade;
    }

    set updateEstado(novoEstado){
        this.estado = novoEstado;
    }
}

let endCarlos = new Endereco('São Miguel, 101','Cajueiro','Posto da Mata','Bahia')

console.log(endCarlos)
    </script>
    
</body>
</html>
